version: "3.9"
x-worker-db:
    &worker-db
    image: "qserv/lite-mariadb"
    command: --port 3306
    environment:
        MYSQL_ROOT_PASSWORD: CHANGEME
x-worker-db-cnf-volume:
    &worker-db-cnf-volume
    - type: bind
      source: ../../../../src/admin/templates/mariadb/etc/my.cnf
      target: /etc/mysql/my.cnf
x-log-volume:
    &log-volume
    - type: bind
      source: ./log/
      target: /config-etc/log/
x-log-environment:
    &log-environment
    LSST_LOG_CONFIG: /config-etc/log/log.cfg
x-worker-cmsd:
    &worker-cmsd
    image: "qserv/${QSERV_IMAGE}"
    # ports are published in worker-xrootd because this container uses that container's network stack.
x-worker-xrootd:
    &worker-xrootd
    image: "qserv/${QSERV_IMAGE}"
    expose:
        - "1094"
        - "2131"
        - "3306" # for the worker db, which shares this container's network stack.
x-worker-repl:
    &worker-repl
    image: "qserv/${QSERV_IMAGE}"
    expose:
        - "25000"
        - "25001"
        - "25002"
        - "25003"
        - "25004"

volumes:
    worker_0_data:
    worker_0_repl_cfg:
    worker_0_xrootd:
    worker_1_data:
    worker_1_repl_cfg:
    worker_1_xrootd:
    manager_xrootd:
    czar_0_data:
    czar_0_cfg:
    repl_mgr_data:
    dashboard_cfg:

networks:
    default:
        ipam:
            driver: default
            config:
                - subnet: 192.168.3.0/24

services:
    worker-db-0:
        << : *worker-db
        volumes:
            - << : *worker-db-cnf-volume
            - type: volume
              source: worker_0_data
              target: /qserv/data
        network_mode: "service:worker-xrootd-0"
    worker-xrootd-0:
        << : *worker-xrootd
        command: entrypoint worker-xrootd --xrd-port 2131 --connection mysql://root:CHANGEME@127.0.0.1:3306 --vnid worker_0 --cmsd-manager manager-xrootd --mysql-monitor-password CHANGEME_MONITOR
        environment:
            << : *log-environment
        volumes:
            - type: volume
              source: worker_0_xrootd
              target: /var/run/xrootd
            - << : *log-volume
        networks:
            default:
                aliases:
                    - worker-cmsd-0
                    - worker-db-0
    worker-cmsd-0:
        << : *worker-cmsd
        command: entrypoint worker-cmsd --connection mysql://root:CHANGEME@worker-db-0:3306 --vnid worker_0 --cmsd-manager manager-xrootd
        network_mode: "service:worker-xrootd-0"
        environment:
            << : *log-environment
        volumes:
            - type: volume
              source: worker_0_xrootd
              target: /var/run/xrootd
            - << : *log-volume
    worker-repl-0:
        << : *worker-repl
        command: entrypoint worker-repl --connection mysql://root:CHANGEME@worker-db-0:3306/qservw_worker --repl-connection mysql://qsreplica@repl-mgr-db:3306/qservReplica --vnid worker_0 --instance-id qserv_proj
        environment:
            << : *log-environment
        volumes:
            - type: volume
              source: worker_0_data
              target: /qserv/data
            - type: volume
              source: worker_0_repl_cfg
              target: /config-etc
            - << : *log-volume
    worker-db-1:
        << : *worker-db
        volumes:
            - << : *worker-db-cnf-volume
            - type: volume
              source: worker_1_data
              target: /qserv/data
        network_mode: "service:worker-xrootd-1"
    worker-xrootd-1:
        << : *worker-xrootd
        command: entrypoint worker-xrootd --xrd-port 2131 --connection mysql://root:CHANGEME@127.0.0.1:3306 --vnid worker_1 --cmsd-manager manager-xrootd --mysql-monitor-password CHANGEME_MONITOR
        environment:
            << : *log-environment
        volumes:
            - type: volume
              source: worker_1_xrootd
              target: /var/run/xrootd
            - << : *log-volume
        networks:
            default:
                aliases:
                    - worker-cmsd-1
                    - worker-db-1
    worker-cmsd-1:
        << : *worker-cmsd
        command: entrypoint worker-cmsd --connection mysql://root:CHANGEME@worker-db-1:3306 --vnid worker_1 --cmsd-manager manager-xrootd
        network_mode: "service:worker-xrootd-1"
        environment:
            << : *log-environment
        volumes:
            - type: volume
              source: worker_1_xrootd
              target: /var/run/xrootd
            - << : *log-volume
    worker-repl-1:
        << : *worker-repl
        command: entrypoint worker-repl --connection mysql://root:CHANGEME@worker-db-1:3306/qservw_worker --repl-connection mysql://qsreplica@repl-mgr-db:3306/qservReplica --vnid worker_1 --instance-id qserv_proj
        environment:
            << : *log-environment
        volumes:
            - type: volume
              source: worker_1_data
              target: /qserv/data
            - type: volume
              source: worker_1_repl_cfg
              target: /config-etc
            - << : *log-volume
    manager-xrootd:
        image: "qserv/${QSERV_IMAGE}"
        command: entrypoint xrootd-manager --cmsd-manager manager-xrootd
        hostname: manager-xrootd
        environment:
            << : *log-environment
        expose:
            - "1094"
            - "2131"
        volumes:
            - type: volume
              source: manager_xrootd
              target: /var/run/xrootd
            - << : *log-volume
        networks:
            default:
                aliases:
                    - manager-cmsd
    manager-cmsd:
        image: "qserv/${QSERV_IMAGE}"
        # NOTE!! cms-delay-servers must match the number of workers being launched!
        command: entrypoint cmsd-manager --cms-delay-servers 2
        network_mode: "service:manager-xrootd"
        environment:
            << : *log-environment
        volumes:
            - type: volume
              source: manager_xrootd
              target: /var/run/xrootd
            - << : *log-volume
    czar-db:
        image: "qserv/lite-mariadb"
        command: --port 3306
        network_mode: "service:czar-proxy"
        environment:
            MYSQL_ROOT_PASSWORD: CHANGEME
        volumes:
            - type: volume
              source: czar_0_data
              target: /qserv/data
            - type: bind
              source: ../../../../src/admin/templates/mariadb/etc/my.cnf
              target: /etc/mysql/my.cnf
    czar-proxy:
        image: "qserv/${QSERV_IMAGE}"
        command: entrypoint --log-level DEBUG proxy --connection root:CHANGEME@127.0.0.1:3306 --mysql-user-qserv qsmaster --xrootd-manager manager-xrootd --czar-db-host czar-db --czar-db-port 3306
        environment:
            << : *log-environment
        volumes:
            - type: volume
              source: czar_0_data
              target: /qserv/data
            - type: volume
              source: czar_0_cfg
              target: /config-etc
            - << : *log-volume
        expose:
            - "3306" # for czar-db
            - "4040"
        networks:
            default:
                aliases:
                    - czar-db
        # ports:
        #     - "127.0.0.1:4040:4040"
    repl-mgr-db:
        image: "qserv/lite-mariadb"
        command: --port 3306
        expose:
            - "3306"
        environment:
            MYSQL_ROOT_PASSWORD: CHANGEME
        volumes:
            - type: volume
              source: repl_mgr_data
              target: /qserv/data
            - type: bind
              source: ../../../../src/admin/templates/repl-db/etc/my.cnf
              target: /etc/mysql/my.cnf
    repl-mgr-controller:
        image: "qserv/${QSERV_IMAGE}"
        command: entrypoint --log-level DEBUG replication-controller --connection mysql://root:CHANGEME@repl-mgr-db:3306/qservReplica --repl-connection mysql://qsreplica@repl-mgr-db:3306/qservReplica --qserv-czar-db mysql://root:CHANGEME@czar-db:3306/qservMeta --instance-id qserv_proj --worker name=worker_0,host=worker-repl-0 --worker name=worker_1,host=worker-repl-1 --xrootd-manager manager-xrootd
        environment:
            << : *log-environment
        expose:
            - "25081"
        volumes:
            - << : *log-volume
    dashboard:
        command: nginx -c /config-etc/nginx.conf
        image: nginx:1.20-alpine
        volumes:
            - type: volume
              source: dashboard_cfg
              target: /config-etc
            - type: bind
              source: ./dashboard/dashboard_wait.sh
              target: /docker-entrypoint.d/dashboard_wait.sh
        ports:
            - "0.0.0.0:${DASHBOARD_PORT}:80"
    init_dashboard:
        command: entrypoint init-dashboard --dashboard-port 80 --dashboard-html /config-etc/www
        image: "qserv/${QSERV_IMAGE}"
        volumes:
            - type: volume
              source: dashboard_cfg
              target: /config-etc
