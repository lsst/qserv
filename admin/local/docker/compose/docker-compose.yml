    czar-db:
        image: "qserv/lite-mariadb"
        command: --port 3306
        expose:
            - "3306"
        environment:
            MYSQL_ROOT_PASSWORD: CHANGEME
        volumes:
            - type: volume
              source: czar_0_data
              target: /qserv/data
            - type: bind
              source: /home/npease/code/qserv/src/admin/templates/mariadb/etc/my.cnf # TODO
              target: /etc/mysql/my.cnf
    czar-proxy:
        image: "qserv/lite-qserv"
        command: entrypoint --log-level DEBUG proxy --connection root:CHANGEME@czar-db:3306 --mysql-user-qserv qsmaster --xrootd-manager manager-xrootd
        volumes:
            - type: volume
              source: czar_0_data
              target: /qserv/data
            - type: volume
              source: czar_0_cfg
              target: /config-etc
