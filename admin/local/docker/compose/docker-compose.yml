    repl-mgr-db:
        image: "qserv/lite-mariadb"
        command: --port 3306
        expose:
            - "3306"
        environment:
            MYSQL_ROOT_PASSWORD: CHANGEME
        volumes:
            - type: volume
              source: repl_mgr_data
              target: /qserv/data
            - type: bind
              source: /home/npease/code/qserv/src/admin/templates/repl-db/etc/my.cnf # TODO
              target: /etc/mysql/my.cnf
    repl-mgr-controller: 
        image: "qserv/lite-qserv"
        command: entrypoint --log-level DEBUG replication-controller --connection root:CHANGEME@repl-mgr-db:3306/qservReplica --repl-connection qsreplica@repl-mgr-db:3306/qservReplica  --instance-id npease_proj --qserv-db-pswd CHANGEME --http-server-port 25508 --worker exporter_port=25003,fs_port=25001,http_loader_port=25004,loader_port=25002,mysql_port=3306,svc_port=25000,vnid=worker_0,xrd_port=2131              


